services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: spike
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d spike"]
      interval: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/spike
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app          # mount your local files into the container
      - /app/node_modules        # but keep node_modules from the container, not your machine
    command: npm run dev         # override the CMD from the Dockerfile
    depends_on:
      - backend
